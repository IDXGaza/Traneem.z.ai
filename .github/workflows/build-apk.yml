name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build web app (Vite)
        run: npm run build
        env:
          NODE_ENV: production

      - name: Setup Java (Temurin 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-

      - name: Install Capacitor CLI globally
        run: npm install -g @capacitor/cli@6

      - name: Add Android platform (only if not present)
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "android/ folder already exists, skipping cap add"
          fi

      - name: Add permissions to AndroidManifest.xml
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"

          if ! grep -q "WRITE_EXTERNAL_STORAGE" "$MANIFEST"; then
            sed -i '/<\/manifest>/i\    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />' "$MANIFEST"
          fi
          if ! grep -q "READ_EXTERNAL_STORAGE" "$MANIFEST"; then
            sed -i '/<\/manifest>/i\    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />' "$MANIFEST"
          fi
          if ! grep -q "RECORD_AUDIO" "$MANIFEST"; then
            sed -i '/<\/manifest>/i\    <uses-permission android:name="android.permission.RECORD_AUDIO" />' "$MANIFEST"
          fi
          if ! grep -q "READ_MEDIA_AUDIO" "$MANIFEST"; then
            sed -i '/<\/manifest>/i\    <uses-permission android:name="android.permission.READ_MEDIA_AUDIO" />' "$MANIFEST"
          fi

          echo "AndroidManifest.xml updated"

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Build Release APK (unsigned)
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon
        continue-on-error: true

      - name: Rename APKs
        run: |
          VERSION=$(node -p "require('./package.json').version")
          DATE=$(date +'%Y-%m-%d')

          DEBUG="android/app/build/outputs/apk/debug/app-debug.apk"
          RELEASE="android/app/build/outputs/apk/release/app-release-unsigned.apk"

          [ -f "$DEBUG" ] && cp "$DEBUG" "traneem-v${VERSION}-${DATE}-debug.apk"
          [ -f "$RELEASE" ] && cp "$RELEASE" "traneem-v${VERSION}-${DATE}-release-unsigned.apk"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: traneem-debug-apk
          path: traneem-v*-debug.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: traneem-release-apk-unsigned
          path: traneem-v*-release-unsigned.apk
          retention-days: 30
